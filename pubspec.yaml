name: poliedroimagesgenerator
description: "A new Flutter project."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.8.1
dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  device_preview: ^1.3.1
  flutter_screenutil: ^5.9.3
  http: ^1.5.0
  shared_preferences: ^2.5.3
  provider: ^6.1.5+1

dev_dependencies:
  flutter_launcher_icons: ^0.13.1
  flutter_test:
    sdk: flutter
  flutter_dotenv: ^5.1.0
  flutter_lints: ^5.0.0

flutter_icons:
  android: true
  ios: true
  image_path: "lib/app/assets/PolIG.png"
  web:
    generate: true
    image_path: "lib/app/assets/PolIG.png"

flutter:
  uses-material-design: true

  assets:
    - lib/app/assets/verticalColored.png
    - lib/app/assets/horizontalColored.png
    - lib/app/assets/horizontalWhite.png
    - lib/app/assets/PolIG.png
    - lib/app/assets/.env
